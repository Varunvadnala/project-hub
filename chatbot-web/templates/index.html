<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ChatBot 🤖</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="app">
    <div class="background-animated"></div>
    <div class="background-glow"></div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="bot-avatar">🤖</div>
            <div>
                <h2>ChatBot</h2>
                <p class="status-text">Always Online</p>
            </div>
        </div>

        <div class="sidebar-actions">
            <button class="btn-new-chat" onclick="clearChat()">
                <span class="icon">✨</span>
                <span>New Chat</span>
            </button>
            <button class="btn-info" onclick="showInfo()">
                <span class="icon">ℹ️</span>
                <span>About</span>
            </button>
        </div>

        <div class="sidebar-footer">Made with ❤️ using Python &amp; Flask</div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">

        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-left">
                <h3>Chat with AI 🤖</h3>
                <p class="chat-subtitle">Ask me anything — science, math, history, tech &amp; more!</p>
            </div>
            <div class="chat-header-right">
                <span>🟢</span> Online
            </div>
        </div>

        <!-- Messages -->
        <div id="chat-box" class="chat-box"></div>

        <!-- Quick Suggestions -->
        <div id="suggestions-area" class="suggestions-area">
            <p class="suggestions-title">✨ Try asking:</p>
            <div class="suggestions-grid">
                <button class="suggestion-btn" onclick="suggestClick('What is Artificial Intelligence?')">
                    <span class="suggestion-icon">🤖</span>What is AI?
                </button>
                <button class="suggestion-btn" onclick="suggestClick('Tell me about Python programming')">
                    <span class="suggestion-icon">🐍</span>Python basics
                </button>
                <button class="suggestion-btn" onclick="suggestClick('What is the speed of light?')">
                    <span class="suggestion-icon">💡</span>Speed of light
                </button>
                <button class="suggestion-btn" onclick="suggestClick('What is the capital of France?')">
                    <span class="suggestion-icon">🗺️</span>Capital of France
                </button>
                <button class="suggestion-btn" onclick="suggestClick('What is photosynthesis?')">
                    <span class="suggestion-icon">🌿</span>Photosynthesis
                </button>
                <button class="suggestion-btn" onclick="suggestClick('Tell me a joke')">
                    <span class="suggestion-icon">😄</span>Tell me a joke
                </button>
                <button class="suggestion-btn" onclick="suggestClick('What is 25 * 48?')">
                    <span class="suggestion-icon">🧮</span>Quick math
                </button>
                <button class="suggestion-btn" onclick="suggestClick('Who is Albert Einstein?')">
                    <span class="suggestion-icon">🧠</span>Einstein
                </button>
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="user-input"
                    placeholder="Ask me anything — science, math, history, tech..."
                    autocomplete="off"
                >
                <button class="btn-send" onclick="sendMessage()" title="Send">
                    <span class="send-icon">➤</span>
                </button>
            </div>
            <p class="hint-text">Press Enter to send &nbsp;•&nbsp; Try the suggestions above!</p>
        </div>

    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
